name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create fresh app and build
        run: |
          flutter create myapp --org com.localeats --project-name localeats
          rm -rf myapp/lib
          cp -r localeats/lib myapp/lib
          cp localeats/pubspec.yaml myapp/pubspec.yaml
          cd myapp
          flutter pub get
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalEats-APK
          path: myapp/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
