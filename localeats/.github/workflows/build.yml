name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project
        run: |
          flutter create fresh_app --org com.localeats --project-name localeats
          cp -r localeats/lib fresh_app/
          cp localeats/pubspec.yaml fresh_app/
          cd fresh_app
          flutter pub get

      - name: Build APK
        run: |
          cd fresh_app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalEats-APK
          path: fresh_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
