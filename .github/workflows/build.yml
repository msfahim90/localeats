name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Build APK
        run: |
          flutter create myapp --org com.localeats --project-name localeats
          rm -rf myapp/lib
          cp -r localeats/lib myapp/lib
          cp localeats/pubspec.yaml myapp/pubspec.yaml
          
          # Fix minSdkVersion to 23
          find myapp/android -name "*.gradle*" | xargs grep -l "minSdk" | while read f; do
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' "$f"
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' "$f"
            sed -i 's/minSdk = 21/minSdk = 23/g' "$f"
            sed -i 's/minSdkVersion 21/minSdkVersion 23/g' "$f"
          done
          
          cd myapp
          flutter pub get
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalEats-APK
          path: myapp/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
